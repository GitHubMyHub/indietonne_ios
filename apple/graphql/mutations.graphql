mutation ScheduleAppointment($scheduleAppointment: ScheduleDataInput!) {
    schedule(scheduleAppointment: $scheduleAppointment) {
        id
        fractions {
            id
            name
            icon
        }
    }
}

mutation DeletePlatformUserPlaces($platformUserPlaceIds: [UUID!]!) {
    deletePlatformUserPlaces(platformUserPlaceIds: $platformUserPlaceIds) {
        id
    }
}
